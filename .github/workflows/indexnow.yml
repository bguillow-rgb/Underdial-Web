name: IndexNow ping

# After new content ships to /docs, submit the site's URLs to IndexNow so
# Bing/Yandex/etc. re-crawl quickly. Builds first to populate dist/sitemap-0.xml,
# then pings. The key file at public/<KEY>.txt ships with /docs.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build (populates dist/sitemap-0.xml)
        run: npm run build

      - name: Ping IndexNow
        env:
          PUBLIC_INDEXNOW_KEY: b25e2dfe2c13bdd88b1e6c6fd321c492
        run: bash scripts/indexnow-ping.sh || true
