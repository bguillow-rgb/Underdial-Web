name: Deploy Pages

# Trigger on every push to main. Workflow-based deploy bypasses the
# legacy GitHub Pages build queue, which got stuck on first build for
# this brand-new repo.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; let in-progress runs finish before
# starting a new one so a fast-fire of commits doesn't pile up.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The Astro site is pre-built and committed to /docs (the same
      # path the legacy build was using). No npm install required —
      # we're just serving static files.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
