<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Underdial app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222C3A"/>
      <stop offset="1" stop-color="#161D27"/>
    </linearGradient>
    <linearGradient id="brass" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C2A468"/>
      <stop offset="0.55" stop-color="#9C7A3C"/>
      <stop offset="1" stop-color="#7C6030"/>
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer case ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#brass)" stroke-width="16"/>

  <!-- Inner dial -->
  <circle cx="256" cy="256" r="126" fill="#0F141C"/>

  <!-- Hour markers -->
  <g fill="#C2A468">
    <rect x="250" y="146" width="12" height="30" rx="3"/>
    <rect x="250" y="336" width="12" height="30" rx="3"/>
    <rect x="146" y="250" width="30" height="12" rx="3"/>
    <rect x="336" y="250" width="30" height="12" rx="3"/>
  </g>
  <g fill="#566173">
    <circle cx="316" cy="176" r="5"/>
    <circle cx="356" cy="316" r="5"/>
    <circle cx="196" cy="336" r="5"/>
    <circle cx="156" cy="196" r="5"/>
    <circle cx="336" cy="196" r="5"/>
    <circle cx="316" cy="336" r="5"/>
    <circle cx="176" cy="316" r="5"/>
    <circle cx="196" cy="176" r="5"/>
  </g>

  <!-- Hands -->
  <g stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="172" stroke="#F5F6F8" stroke-width="14"/>
    <line x1="256" y1="256" x2="322" y2="290" stroke="#F5F6F8" stroke-width="11"/>
    <line x1="256" y1="256" x2="210" y2="302" stroke="#C2A468" stroke-width="6"/>
  </g>

  <!-- Center cap -->
  <circle cx="256" cy="256" r="14" fill="#C2A468"/>
  <circle cx="256" cy="256" r="5" fill="#0F141C"/>
</svg>
